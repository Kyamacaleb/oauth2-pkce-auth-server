spring:
  application:
    name: oauth2-pkce-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/oauth2_pkce_db
    username: postgres
    password: 8235
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      # validate: Hibernate checks that the DB schema matches our entities.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false   # keep logs clean; set true for debugging

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /
    session:
      cookie:
        name: OAUTH2SESSION
        http-only: true
        secure: false   # set true behind HTTPS in production

logging:
  level:
    root: WARN
    org.springframework.security: INFO
    com.caleb.backend: DEBUG
