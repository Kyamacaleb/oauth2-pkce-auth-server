spring:
  application:
    name: oauth2-pkce-demo

  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/oauth2_pkce_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:8235}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:   ${DB_POOL_MAX:10}
      minimum-idle:        ${DB_POOL_MIN:2}
      connection-timeout:  30000
      idle-timeout:        600000
      max-lifetime:        1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  flyway:
    enabled:             true
    baseline-on-migrate: true
    locations:           classpath:db/migration
  session:
    timeout: 2h

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    session:
      cookie:
        name:      OAUTH2SESSION
        http-only: true
        secure:    ${SESSION_SECURE:false}   # set true in prod via env var
        same-site: Lax
  # Forward headers from nginx (needed for correct redirect URIs behind proxy)
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never   # don't expose DB details publicly

logging:
  level:
    root:                              WARN
    com.caleb.backend:                 INFO
    org.springframework.security:      WARN
    org.springframework.web:           WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"