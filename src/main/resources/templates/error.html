<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error · OAuth2 Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0a0a0b; --paper: #f4f1eb; --mid: #888;
            --border: #d4d0c8; --error: #c0392b;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Syne', sans-serif;
        }
        body {
            background: var(--paper); color: var(--ink);
            font-family: var(--display); min-height: 100vh;
            display: grid; place-items: center; padding: 2rem;
        }
        .card {
            max-width: 520px; width: 100%;
            background: #fff; border: 1px solid var(--border);
            border-radius: 6px; padding: 2.5rem;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06);
        }
        .eyebrow {
            font-family: var(--mono); font-size: 0.68rem;
            color: var(--error); letter-spacing: 0.12em;
            text-transform: uppercase; margin-bottom: 0.75rem;
        }
        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1.5rem; }
        .error-box {
            background: #fff5f5; border: 1px solid #f5c0c0;
            border-radius: 4px; padding: 1rem 1.25rem;
            font-family: var(--mono); font-size: 0.78rem;
            color: var(--error); line-height: 1.7;
            margin-bottom: 1.5rem; word-break: break-all;
        }
        .error-box strong { font-weight: 500; }
        a {
            display: inline-block; font-family: var(--mono);
            font-size: 0.78rem; color: var(--ink);
            text-decoration: none; border-bottom: 1px solid var(--border);
            padding-bottom: 1px; transition: border-color 0.2s;
        }
        a:hover { border-color: var(--ink); }
    </style>
</head>
<body>
<div class="card">
    <p class="eyebrow">Authorization Error</p>
    <h1>Something went wrong</h1>
    <div class="error-box">
        <strong th:text="${error}">error_code</strong><br/>
        <span th:text="${errorDescription}">Error description</span>
    </div>
    <a href="/start-auth">← Try again</a>
</div>
</body>
</html>
