<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In · OAuth2 Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0a0a0b;
            --paper: #f4f1eb;
            --accent: #c8f03c;
            --mid: #888;
            --border: #d4d0c8;
            --border-focus: #0a0a0b;
            --error-bg: #fff0f0;
            --error-border: #e0a0a0;
            --error-text: #c0392b;
            --success-bg: #f0fff4;
            --success-border: #a0d8b0;
            --success-text: #27642a;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--display);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: appear 0.4s ease both;
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--mid);
            text-decoration: none;
            letter-spacing: 0.06em;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--ink); }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2.5rem;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06);
        }

        .card-header {
            margin-bottom: 2rem;
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--mid);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.76rem;
            margin-bottom: 1.5rem;
            border: 1px solid;
            line-height: 1.5;
        }

        .alert-error   { background: var(--error-bg);   border-color: var(--error-border);   color: var(--error-text); }
        .alert-success { background: var(--success-bg);  border-color: var(--success-border); color: var(--success-text); }

        .field {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--mid);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--ink);
            font-family: var(--mono);
            font-size: 0.9rem;
            padding: 0.8rem 1rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(10,10,11,0.08);
        }

        input.is-invalid { border-color: var(--error-border); background: var(--error-bg); }
        input.is-valid   { border-color: #b0d8b8; }

        .field-hint {
            font-family: var(--mono);
            font-size: 0.7rem;
            margin-top: 0.35rem;
            color: var(--mid);
        }

        .field-hint.invalid { color: var(--error-text); }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }

        .btn-submit {
            width: 100%;
            background: var(--ink);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1rem;
            border: 2px solid var(--ink);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }

        .btn-submit:hover  { background: #222; }
        .btn-submit:active { transform: scale(0.99); }

        .footer-note {
            margin-top: 1.5rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--mid);
            text-align: center;
            line-height: 1.6;
        }

        .footer-note code {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.1rem 0.35rem;
            color: var(--ink);
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← Back</a>

    <div class="card">
        <div class="card-header">
            <p class="eyebrow">OAuth2 Server</p>
            <h1>Sign in</h1>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid email or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post" id="loginForm" novalidate>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email"    id="email"    name="email"
                       placeholder="user@example.com"
                       autocomplete="email"
                       autofocus required/>
                <div class="field-hint" id="emailHint"></div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••"
                       autocomplete="current-password"
                       minlength="8" required/>
                <div class="field-hint" id="passwordHint"></div>
            </div>

            <hr class="divider"/>
            <button type="submit" class="btn-submit">Sign in →</button>
        </form>

    </div>
</div>

<script>
    const emailEl    = document.getElementById('email');
    const passEl     = document.getElementById('password');
    const emailHint  = document.getElementById('emailHint');
    const passHint   = document.getElementById('passwordHint');
    const form       = document.getElementById('loginForm');

    const isEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    emailEl.addEventListener('blur', () => {
        const v = emailEl.value.trim();
        if (!v || !isEmail(v)) {
            emailEl.className = 'is-invalid';
            emailHint.textContent = 'Enter a valid email address.';
            emailHint.className = 'field-hint invalid';
        } else {
            emailEl.className = 'is-valid';
            emailHint.textContent = '';
        }
    });

    passEl.addEventListener('blur', () => {
        if (passEl.value.length < 8) {
            passEl.className = 'is-invalid';
            passHint.textContent = 'Minimum 8 characters.';
            passHint.className = 'field-hint invalid';
        } else {
            passEl.className = 'is-valid';
            passHint.textContent = '';
        }
    });

    form.addEventListener('submit', e => {
        let ok = true;
        if (!isEmail(emailEl.value.trim())) {
            emailEl.className = 'is-invalid';
            emailHint.textContent = 'Enter a valid email address.';
            emailHint.className = 'field-hint invalid';
            ok = false;
        }
        if (passEl.value.length < 8) {
            passEl.className = 'is-invalid';
            passHint.textContent = 'Minimum 8 characters.';
            passHint.className = 'field-hint invalid';
            ok = false;
        }
        if (!ok) e.preventDefault();
    });
</script>
</body>
</html>
