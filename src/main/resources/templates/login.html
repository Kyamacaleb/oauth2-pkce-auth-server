<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In · OAuth2 Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #13161d;
            --border: #1f2330;
            --border-focus: #3d8bff;
            --text: #e8eaf0;
            --muted: #6b7280;
            --accent: #3d8bff;
            --accent-hover: #5a9fff;
            --error-bg: #1a0f0f;
            --error-border: #7f1d1d;
            --error-text: #fca5a5;
            --success: #34d399;
            --mono: 'DM Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background-image:
                    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(61,139,255,0.08) 0%, transparent 70%);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3d8bff, #6366f1);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border: 1px solid;
        }

        .alert-error {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }

        .alert-success {
            background: rgba(52,211,153,0.08);
            border-color: rgba(52,211,153,0.3);
            color: var(--success);
        }

        .field {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(61,139,255,0.12);
        }

        input::placeholder { color: #3a3f4f; }

        .field-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        .field-hint.invalid { color: var(--error-text); }

        button[type="submit"] {
            width: 100%;
            background: var(--accent);
            color: #fff;
            font-family: var(--sans);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.01em;
        }

        button[type="submit"]:hover { background: var(--accent-hover); }
        button[type="submit"]:active { transform: scale(0.99); }

        .footer-note {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 1.8rem;
            font-family: var(--mono);
        }

        .footer-note span {
            color: var(--accent);
        }

        /* Inline validation styles */
        input.is-invalid { border-color: #7f1d1d; }
        input.is-valid   { border-color: rgba(52,211,153,0.4); }
    </style>
</head>
<body>

<div class="card">

    <div class="logo">
        <div class="logo-icon">🔐</div>
        <span class="logo-text">oauth2 / server</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <!-- Error alerts -->
    <div th:if="${param.error}" class="alert alert-error">
        Invalid email or password. Please try again.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        You have been signed out successfully.
    </div>

    <form th:action="@{/login}" method="post" id="loginForm" novalidate>

        <div class="field">
            <label for="email">Email address</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                    autofocus
            />
            <div class="field-hint" id="emailHint"></div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                    minlength="8"
            />
            <div class="field-hint" id="passwordHint"></div>
        </div>

        <button type="submit" id="submitBtn">Sign in</button>
    </form>
</div>

<script>
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailHint     = document.getElementById('emailHint');
    const passwordHint  = document.getElementById('passwordHint');
    const form          = document.getElementById('loginForm');

    function validateEmail(val) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(val);
    }

    emailInput.addEventListener('blur', () => {
        const val = emailInput.value.trim();
        if (!val) {
            emailInput.className = 'is-invalid';
            emailHint.textContent = 'Email is required.';
            emailHint.className = 'field-hint invalid';
        } else if (!validateEmail(val)) {
            emailInput.className = 'is-invalid';
            emailHint.textContent = 'Please enter a valid email address.';
            emailHint.className = 'field-hint invalid';
        } else {
            emailInput.className = 'is-valid';
            emailHint.textContent = '';
        }
    });

    passwordInput.addEventListener('blur', () => {
        const val = passwordInput.value;
        if (!val) {
            passwordInput.className = 'is-invalid';
            passwordHint.textContent = 'Password is required.';
            passwordHint.className = 'field-hint invalid';
        } else if (val.length < 8) {
            passwordInput.className = 'is-invalid';
            passwordHint.textContent = 'Password must be at least 8 characters.';
            passwordHint.className = 'field-hint invalid';
        } else {
            passwordInput.className = 'is-valid';
            passwordHint.textContent = '';
        }
    });

    form.addEventListener('submit', (e) => {
        let valid = true;

        const email = emailInput.value.trim();
        if (!email || !validateEmail(email)) {
            emailInput.className = 'is-invalid';
            emailHint.textContent = 'Please enter a valid email address.';
            emailHint.className = 'field-hint invalid';
            valid = false;
        }

        const pwd = passwordInput.value;
        if (!pwd || pwd.length < 8) {
            passwordInput.className = 'is-invalid';
            passwordHint.textContent = 'Password must be at least 8 characters.';
            passwordHint.className = 'field-hint invalid';
            valid = false;
        }

        if (!valid) e.preventDefault();
    });
</script>

</body>
</html>
